services:
  - type: web
    name: finbot
    runtime: python
    plan: free
    buildCommand: python -m pip install .
    startCommand: python -m uvicorn finbot.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: finbot
      - key: APP_DEBUG
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_ALLOW_REGISTRATION
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AI_ENABLED
        value: "false"
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-nano
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: LOG_LEVEL
        value: INFO
      - key: HTTP_CONNECT_TIMEOUT_SECONDS
        value: "3"
      - key: HTTP_READ_TIMEOUT_SECONDS
        value: "8"
      - key: METRICS_RETENTION_DAYS
        value: "90"
